openapi: 3.1.0
info:
  title: Oxmon 智能告警仲裁中心 API
  version: 1.0.0
servers:
  - url: https://api.example.com
paths:
  /v1/alerts:
    get:
      summary: List alerts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Create alert rule
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            type: string
      responses:
        '201':
          description: Created
  /v1/alerts/{id}/route:
    post:
      summary: Route alert to on-call group
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Routed
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
